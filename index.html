let score = 0;
let currentPlayer = null;
let questionCount = 0;
const maxQuestions = 10;

function nextQuestion() {
if (questionCount >= maxQuestions) {
  document.getElementById("progress").innerText = 
    `${maxQuestions}問中 ${maxQuestions}問終了！`;
  alert(`ゲーム終了！あなたのスコアは ${score} 点です`);
  return;
}

  currentPlayer = players[Math.floor(Math.random() * players.length)];
  document.getElementById("question").innerText =
    `この選手の出身地は？ ${currentPlayer.name}（${currentPlayer.team}）`;
  document.getElementById("player-img").src = currentPlayer.url;

  questionCount++;
  document.getElementById("progress").innerText = `${questionCount} / ${maxQuestions} 問目`;
}

document.querySelectorAll("svg path, svg circle").forEach(area => {
  area.addEventListener("click", () => {
    if (questionCount > maxQuestions) return; // 終了後は無効化

    const correctCode = prefectureCodeMap[currentPlayer.birthplace];
    if (area.id === correctCode) {
      score += 10;
      alert("正解！+10ポイント");
    } else {
      alert(`不正解！正解は ${currentPlayer.birthplace} でした`);
    }
    document.getElementById("score").innerText = score;
    nextQuestion();
  });
});
